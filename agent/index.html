<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CityPulse - AI Travel Intelligence</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: Segoe UI, sans-serif;
  background: #0f0c29;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  color: white;
}
.hero {
  text-align: center;
  margin-bottom: 40px;
}
.emoji { font-size: 64px; margin-bottom: 16px; display: block; }
h1 {
  font-size: 48px;
  font-weight: 800;
  color: #f093fb;
  margin-bottom: 10px;
}
.tagline {
  font-size: 16px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 8px;
}
.badge {
  display: inline-block;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  margin-top: 8px;
}
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 32px;
  width: 100%;
  max-width: 680px;
}
.cities {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 24px;
  justify-content: center;
}
.city-btn {
  background: rgba(255,255,255,0.08);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 8px 18px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
}
.city-btn:hover {
  background: #f093fb;
  border-color: transparent;
  transform: translateY(-2px);
}
.input-row {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}
input {
  flex: 1;
  padding: 14px 20px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 14px;
  font-size: 15px;
  color: white;
  outline: none;
}
input::placeholder { color: rgba(255,255,255,0.4); }
input:focus { border-color: #f093fb; }
.ask-btn {
  background: #f093fb;
  color: white;
  border: none;
  padding: 14px 28px;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.ask-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.ask-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.loading {
  text-align: center;
  padding: 24px;
  display: none;
  color: rgba(255,255,255,0.7);
}
.spinner {
  display: inline-block;
  width: 24px;
  height: 24px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top: 3px solid #f093fb;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 10px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.response {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 24px;
  white-space: pre-wrap;
  line-height: 1.9;
  font-size: 15px;
  color: rgba(255,255,255,0.9);
  display: none;
}
.stats {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  justify-content: center;
}
.stat {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px 20px;
  text-align: center;
  flex: 1;
}
.stat-num {
  font-size: 22px;
  font-weight: 800;
  color: #f093fb;
}
.stat-label {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
}
</style>
</head>
<body>
<div class="hero">
  <span class="emoji">✈️</span>
  <h1>CityPulse</h1>
  <p class="tagline">AI Travel Intelligence powered by MCP Protocol</p>
  <span class="badge">Groq LLM + Live APIs + MCP Architecture</span>
</div>
<div class="card">
  <div class="cities">
    <button class="city-btn" onclick="ask('Tell me about Tokyo!')">Tokyo</button>
    <button class="city-btn" onclick="ask('Tell me about Paris!')">Paris</button>
    <button class="city-btn" onclick="ask('Tell me about Dubai!')">Dubai</button>
    <button class="city-btn" onclick="ask('Tell me about Mumbai!')">Mumbai</button>
    <button class="city-btn" onclick="ask('Tell me about Singapore!')">Singapore</button>
    <button class="city-btn" onclick="ask('Tell me about Hyderabad!')">Hyderabad</button>
    <button class="city-btn" onclick="ask('Tell me about London!')">London</button>
    <button class="city-btn" onclick="ask('Tell me about Sydney!')">Sydney</button>
  </div>
  <div class="input-row">
    <input type="text" id="q" placeholder="Ask about any city... e.g. Tell me about Delhi!" onkeypress="if(event.key==='Enter') ask()"/>
    <button class="ask-btn" id="btn" onclick="ask()">Ask</button>
  </div>
  <div class="loading" id="loading">
    <span class="spinner"></span>Fetching live data from MCP tools...
  </div>
  <div class="response" id="response"></div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num">3</div>
      <div class="stat-label">Live MCP Tools</div>
    </div>
    <div class="stat">
      <div class="stat-num">10+</div>
      <div class="stat-label">Cities Supported</div>
    </div>
    <div class="stat">
      <div class="stat-num">Live</div>
      <div class="stat-label">Real-time Data</div>
    </div>
  </div>
</div>
<script>
async function ask(preset) {
  const q = preset || document.getElementById("q").value.trim();
  if (!q) return;
  document.getElementById("q").value = q;
  document.getElementById("btn").disabled = true;
  document.getElementById("loading").style.display = "block";
  document.getElementById("response").style.display = "none";
  try {
    const res = await fetch("/query", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({question: q})
    });
    const data = await res.json();
    const box = document.getElementById("response");
    box.style.display = "block";
    box.innerText = data.response;
  } catch(e) {
    const box = document.getElementById("response");
    box.style.display = "block";
    box.innerText = "Connection error. Please try again!";
  }
  document.getElementById("loading").style.display = "none";
  document.getElementById("btn").disabled = false;
}
</script>
</body>
</html>
